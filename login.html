<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Institucional | Directorio UPB</title>

  <link rel="stylesheet" href="login.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="login-page">

  <!-- IZQUIERDA -->
  <section class="login-left">

    <div class="login-card">

      <div class="badge-secure">
        🔒 Acceso Seguro
      </div>

      <img src="user.jpg" class="login-logo" alt="UPB">

      <h1 class="login-title">Bienvenido</h1>

      <p class="login-subtitle">
        Ingrese con sus credenciales institucionales para acceder al sistema interno de directorio corporativo.
      </p>

      <form id="loginForm" class="login-form">

        <div class="field-group">
          <label for="usuario">Usuario</label>
          <input
            type="text"
            id="usuario"
            placeholder="Ingrese su usuario"
            required
          >
        </div>

        <div class="field-group">
          <label for="password">Contraseña</label>

          <div class="password-box">
            <input
              type="password"
              id="password"
              placeholder="Ingrese su contraseña"
              required
            >

            <button type="button" id="togglePass" class="eye-btn">
              👁
            </button>
          </div>
        </div>

        <div class="login-options">

          <label class="remember-me">
            <input type="checkbox">
            <span>Recordar sesión</span>
          </label>

          <a href="#" class="forgot-link">
            ¿Olvidó su clave?
          </a>

        </div>

        <button type="submit" class="login-btn">
          Entrar al sistema
        </button>

      </form>

      <p id="mensaje" class="mensaje"></p>

      <div class="footer-security">
        🛡 Plataforma protegida y monitoreada 24/7
      </div>

    </div>

  </section>

  <!-- DERECHA -->
  <section class="login-right">

    <div class="slider-overlay"></div>

    <div class="slider-content">
      <h2>Directorio Institucional</h2>

      <p>
        Conecta personas, áreas y procesos con rapidez, orden y seguridad.
      </p>
    </div>

  </section>

</div>

<script src="login.js"></script>

</body>
</html>
